<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Live Viewer for Traders</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #161a23;
      --border:    #252c3a;
      --accent:    #3b82f6;
      --accent-h:  #2563eb;
      --danger:    #ef4444;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --radius:    8px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 15px;
      line-height: 1.5;
    }

    /* ── Layout wrapper ── */
    .wrapper {
      max-width: 960px;
      margin: 0 auto;
      padding: 20px 16px 40px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 100%;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 12px 0 4px;
    }
    header h1 {
      font-size: clamp(1.1rem, 3vw, 1.6rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    header h1 span {
      color: var(--accent);
    }
    header p {
      margin-top: 4px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    /* ── Input row ── */
    .input-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .input-row input {
      flex: 1 1 200px;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }
    .input-row input:focus {
      border-color: var(--accent);
    }
    .input-row input::placeholder {
      color: var(--muted);
    }

    /* ── Buttons ── */
    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: var(--radius);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent-h); }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--text); }

    /* ── Error message ── */
    #error-msg {
      display: none;
      font-size: 0.82rem;
      color: var(--danger);
      margin-top: 8px;
      padding: 8px 12px;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: var(--radius);
    }

    /* ── Video container — responsive 16:9 ── */
    #player-wrap {
      display: none; /* shown after first load */
    }
    .aspect-box {
      position: relative;
      width: 100%;
      padding-top: 56.25%; /* 9/16 = 56.25% */
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
    }
    .aspect-box iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ── Footer ── */
    footer {
      margin-top: auto;
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
      padding-top: 8px;
    }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- ── Header ── -->
  <header>
    <h1>YouTube Live Viewer <span>for Traders</span></h1>
    <p>Paste a YouTube Live link or Channel link and press Load.</p>
  </header>

  <!-- ── Input card ── -->
  <div class="card">
    <div class="input-row">
      <!-- URL input -->
      <input
        type="text"
        id="url-input"
        placeholder="https://www.youtube.com/watch?v=...  or  https://youtu.be/...  or channel URL"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      />
      <!-- Load button -->
      <button class="btn btn-primary" id="btn-load" onclick="loadStream()">Load Stream</button>
      <!-- Clear button -->
      <button class="btn btn-ghost" id="btn-clear" onclick="clearStream()">Clear</button>
    </div>
    <!-- Validation error -->
    <div id="error-msg"></div>
  </div>

  <!-- ── Embedded player (hidden until a valid URL is loaded) ── -->
  <div class="card" id="player-wrap">
    <div class="aspect-box">
      <iframe
        id="yt-iframe"
        src=""
        allow="autoplay; encrypted-media; picture-in-picture"
        allowfullscreen
        title="YouTube Live Stream"
      ></iframe>
    </div>
  </div>

  <!-- ── Footer ── -->
  <footer>
    Not affiliated with YouTube or any content creator.
    Videos are displayed using YouTube's official embed feature.
  </footer>

</div>

<script>
  /* ─────────────────────────────────────────────
     YouTube Live Viewer for Traders — JS logic
     ───────────────────────────────────────────── */

  const STORAGE_KEY = 'yt_trader_last_url';

  /* ── Grab DOM references ── */
  const input      = document.getElementById('url-input');
  const errorMsg   = document.getElementById('error-msg');
  const playerWrap = document.getElementById('player-wrap');
  const iframe     = document.getElementById('yt-iframe');

  /* ── Auto-load the last saved URL on page open ── */
  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      input.value = saved;
      loadStream();
    }
  });

  /* ── Allow pressing Enter inside the input field ── */
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') loadStream();
  });

  /* ──────────────────────────────────────────────
     parseYouTubeURL()
     Accepts various YouTube URL formats and returns
     an embed URL string, or null if unrecognised.
  ────────────────────────────────────────────── */
  function parseYouTubeURL(raw) {
    // Trim whitespace
    const url = raw.trim();

    // Attempt to construct a URL object for reliable parsing
    let parsed;
    try {
      // Prepend protocol if missing so URL() doesn't throw
      parsed = new URL(url.startsWith('http') ? url : 'https://' + url);
    } catch {
      return null; // not a valid URL at all
    }

    const host     = parsed.hostname.replace(/^www\./, '');
    const pathname = parsed.pathname; // e.g. /watch or /channel/UCxxx or /@handle

    /* ── 1. Standard watch URL: youtube.com/watch?v=VIDEO_ID ── */
    if ((host === 'youtube.com' || host === 'm.youtube.com') && pathname === '/watch') {
      const vid = parsed.searchParams.get('v');
      if (vid) return buildVideoEmbed(vid);
    }

    /* ── 2. Short URL: youtu.be/VIDEO_ID ── */
    if (host === 'youtu.be') {
      const vid = pathname.slice(1); // strip leading /
      if (vid) return buildVideoEmbed(vid);
    }

    /* ── 3. Shorts: youtube.com/shorts/VIDEO_ID ── */
    const shortsMatch = pathname.match(/^\/shorts\/([a-zA-Z0-9_-]+)/);
    if (shortsMatch) return buildVideoEmbed(shortsMatch[1]);

    /* ── 4. Embedded URL already: youtube.com/embed/VIDEO_ID ── */
    const embedMatch = pathname.match(/^\/embed\/([a-zA-Z0-9_-]+)/);
    if (embedMatch) return buildVideoEmbed(embedMatch[1]);

    /* ── 5. Live channel URL: youtube.com/channel/UCxxx/live ── */
    const channelLiveMatch = pathname.match(/^\/(channel|c|user)\/([^/]+)\/live/);
    if (channelLiveMatch) return buildChannelLiveEmbed(channelLiveMatch[2]);

    /* ── 6. Handle URL: youtube.com/@handle/live ── */
    const handleLiveMatch = pathname.match(/^\/@([^/]+)\/live/);
    if (handleLiveMatch) return buildChannelLiveEmbed('@' + handleLiveMatch[1]);

    /* ── 7. Channel root URL (attempt live sub-path) ── */
    const channelRootMatch = pathname.match(/^\/(channel|c|user)\/([^/]+)\/?$/);
    if (channelRootMatch) return buildChannelLiveEmbed(channelRootMatch[2]);

    /* ── 8. Handle root URL: youtube.com/@handle ── */
    const handleRootMatch = pathname.match(/^\/@([^/]+)\/?$/);
    if (handleRootMatch) return buildChannelLiveEmbed('@' + handleRootMatch[1]);

    // Unrecognised YouTube URL
    return null;
  }

  /* ── Helpers to build embed URLs ── */

  function buildVideoEmbed(videoId) {
    // autoplay=1 starts playback automatically (muted=1 required by browsers)
    return `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=0&rel=0`;
  }

  function buildChannelLiveEmbed(channelOrHandle) {
    /* YouTube does not provide a direct embed URL for a live channel feed.
       The best approach is to open the channel live page inside the iframe.
       Note: YouTube may block iframe embedding for channel pages — in that
       case the user should copy the video ID from the live stream directly. */
    const base = channelOrHandle.startsWith('@')
      ? `https://www.youtube.com/${channelOrHandle}/live`
      : `https://www.youtube.com/channel/${channelOrHandle}/live`;
    return base;
  }

  /* ──────────────────────────────────────────────
     loadStream()
     Called when user clicks "Load Stream" or presses Enter.
  ────────────────────────────────────────────── */
  function loadStream() {
    const raw = input.value.trim();

    // Hide any previous error
    hideError();

    // Basic empty check
    if (!raw) {
      showError('Please paste a YouTube URL first.');
      return;
    }

    // Check it references YouTube at all
    if (!raw.includes('youtube.com') && !raw.includes('youtu.be')) {
      showError('This does not look like a YouTube link. Please check the URL and try again.');
      return;
    }

    // Try to parse into an embed URL
    const embedUrl = parseYouTubeURL(raw);

    if (!embedUrl) {
      showError('Could not parse this YouTube URL. Try pasting the video URL directly (e.g. youtube.com/watch?v=...).');
      return;
    }

    // Save to localStorage so we can restore on next open
    localStorage.setItem(STORAGE_KEY, raw);

    // Set iframe src and reveal the player
    iframe.src = embedUrl;
    playerWrap.style.display = 'block';

    // Smooth-scroll to player on mobile
    playerWrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  /* ──────────────────────────────────────────────
     clearStream()
     Called when user clicks "Clear".
  ────────────────────────────────────────────── */
  function clearStream() {
    // Clear input field
    input.value = '';

    // Remove saved URL
    localStorage.removeItem(STORAGE_KEY);

    // Unload iframe by resetting src
    iframe.src = '';
    playerWrap.style.display = 'none';

    // Hide any errors
    hideError();

    // Focus input for convenience
    input.focus();
  }

  /* ── UI helpers ── */

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
  }

  function hideError() {
    errorMsg.style.display = 'none';
    errorMsg.textContent = '';
  }
</script>
</body>
</html>
