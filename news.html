<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YouTube Trader Hub</title>
<style>
/* ══════════════════════════════════════════════
   YOUTUBE TRADER HUB — Dark Trading Terminal UI
   Fuente: JetBrains Mono para el aire técnico
   ══════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Sora:wght@300;400;600;700&display=swap');

:root {
  --bg:         #080b10;
  --surface:    #0e1318;
  --card:       #121820;
  --border:     #1e2a38;
  --border-lit: #2a3d52;
  --accent:     #00c8ff;
  --accent2:    #00ff9d;
  --accent3:    #ff6b35;
  --muted:      #4a6080;
  --text:       #cdd9e5;
  --text-dim:   #7a94aa;
  --danger:     #ff4757;
  --mono:       'JetBrains Mono', monospace;
  --sans:       'Sora', sans-serif;
  --r:          6px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Scanline texture overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 3px,
    rgba(0,0,0,0.07) 3px,
    rgba(0,0,0,0.07) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* ── Layout ── */
.shell {
  max-width: 1100px;
  margin: 0 auto;
  padding: 16px 14px 48px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* ── Header ── */
.hdr {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  position: relative;
  overflow: hidden;
}
.hdr::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(to bottom, var(--accent), var(--accent2));
  border-radius: var(--r) 0 0 var(--r);
}
.logo {
  font-family: var(--mono);
  font-size: clamp(0.9rem, 2.5vw, 1.15rem);
  font-weight: 700;
  letter-spacing: -0.03em;
  color: var(--text);
}
.logo em { color: var(--accent); font-style: normal; }
.logo-sub {
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--muted);
  letter-spacing: 0.05em;
}
.live-dot {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 5px;
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--accent2);
  letter-spacing: 0.08em;
}
.live-dot::before {
  content: '';
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent2);
  animation: pulse 1.6s infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,255,157,0.5); }
  50% { opacity: 0.6; box-shadow: 0 0 0 5px rgba(0,255,157,0); }
}

/* ── Tabs ── */
.tabs {
  display: flex;
  gap: 4px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 5px;
}
.tab {
  flex: 1;
  padding: 8px 6px;
  text-align: center;
  font-family: var(--mono);
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--muted);
  background: transparent;
  border: 1px solid transparent;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
}
.tab.active {
  background: var(--card);
  color: var(--accent);
  border-color: var(--border-lit);
}
.tab:hover:not(.active) { color: var(--text-dim); }

/* ── Panel ── */
.panel { display: none; }
.panel.active { display: flex; flex-direction: column; gap: 12px; }

/* ── Quick categories (chips) ── */
.chip-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.chip {
  padding: 5px 11px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 999px;
  font-family: var(--mono);
  font-size: 0.7rem;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.chip:hover { border-color: var(--accent); color: var(--accent); }
.chip.active { background: rgba(0,200,255,0.1); border-color: var(--accent); color: var(--accent); }

/* ── Search box ── */
.search-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.search-row input {
  flex: 1 1 180px;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--text);
  font-family: var(--sans);
  font-size: 0.88rem;
  outline: none;
  transition: border-color 0.15s;
  caret-color: var(--accent);
}
.search-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,200,255,0.08); }
.search-row input::placeholder { color: var(--muted); }

/* ── URL input panel ── */
.url-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.url-row input {
  flex: 1 1 200px;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  color: var(--text);
  font-family: var(--mono);
  font-size: 0.8rem;
  outline: none;
  transition: border-color 0.15s;
  caret-color: var(--accent);
}
.url-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,200,255,0.08); }
.url-row input::placeholder { color: var(--muted); font-family: var(--sans); }

/* ── Buttons ── */
.btn {
  padding: 10px 18px;
  border: none;
  border-radius: var(--r);
  font-family: var(--mono);
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.btn-accent {
  background: var(--accent);
  color: #000;
}
.btn-accent:hover { background: #33d6ff; box-shadow: 0 0 12px rgba(0,200,255,0.35); }

.btn-ghost {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
}
.btn-ghost:hover { color: var(--text); border-color: var(--border-lit); }

/* ── Result grid ── */
.results {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
}
.result-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.15s;
}
.result-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
}
.result-thumb {
  width: 100%;
  aspect-ratio: 16/9;
  object-fit: cover;
  display: block;
  background: var(--surface);
}
.result-meta {
  padding: 8px 10px;
}
.result-title {
  font-size: 0.76rem;
  color: var(--text);
  font-weight: 600;
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.result-channel {
  margin-top: 3px;
  font-size: 0.66rem;
  color: var(--muted);
  font-family: var(--mono);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.result-duration {
  display: inline-block;
  margin-top: 4px;
  padding: 1px 5px;
  background: rgba(0,200,255,0.08);
  border: 1px solid rgba(0,200,255,0.2);
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 0.62rem;
  color: var(--accent);
}

/* ── Searching indicator ── */
.searching {
  text-align: center;
  padding: 24px;
  font-family: var(--mono);
  font-size: 0.78rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  display: none;
}
.searching span {
  display: inline-block;
  animation: blink 0.9s steps(1) infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* ── Error / info banner ── */
.banner {
  display: none;
  padding: 9px 13px;
  border-radius: var(--r);
  font-size: 0.78rem;
  font-family: var(--mono);
}
.banner.error {
  background: rgba(255,71,87,0.07);
  border: 1px solid rgba(255,71,87,0.25);
  color: var(--danger);
}
.banner.info {
  background: rgba(0,200,255,0.07);
  border: 1px solid rgba(0,200,255,0.2);
  color: var(--accent);
}

/* ── Player ── */
.player-wrap {
  display: none;
}
.player-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 8px;
  flex-wrap: wrap;
}
.player-title-txt {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.aspect-box {
  position: relative;
  width: 100%;
  padding-top: 56.25%;
  background: #000;
  border-radius: var(--r);
  overflow: hidden;
  border: 1px solid var(--border);
}
.aspect-box iframe {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  border: none;
}

/* ── Divider ── */
.divider {
  height: 1px;
  background: var(--border);
  border-radius: 1px;
}

/* ── Footer ── */
footer {
  text-align: center;
  font-size: 0.68rem;
  color: var(--muted);
  font-family: var(--mono);
  padding-top: 4px;
  line-height: 1.6;
}

/* ── Mobile tweaks ── */
@media (max-width: 520px) {
  .results { grid-template-columns: repeat(2, 1fr); }
  .tab { font-size: 0.68rem; padding: 7px 4px; }
  .logo { font-size: 0.85rem; }
}
</style>
</head>
<body>
<div class="shell">

  <!-- ══ HEADER ══ -->
  <header class="hdr">
    <div>
      <div class="logo"><em>▶</em> YouTube Trader Hub</div>
      <div class="logo-sub">MEDIA INSIDE CTRADER · NO EXTERNAL BROWSER NEEDED</div>
    </div>
    <div class="live-dot">LIVE</div>
  </header>

  <!-- ══ TABS ══ -->
  <div class="tabs" role="tablist">
    <button class="tab active" onclick="switchTab('search')" id="tab-search">🔍 BUSCAR</button>
    <button class="tab" onclick="switchTab('url')"    id="tab-url">🔗 URL DIRECTA</button>
  </div>

  <!-- ══ PANEL: BUSCAR ══ -->
  <div class="panel active" id="panel-search">

    <!-- Categorías rápidas -->
    <div class="chip-row" id="chip-row">
      <button class="chip active" onclick="quickSearch(this,'trading en vivo')">📈 Trading Live</button>
      <button class="chip" onclick="quickSearch(this,'forex análisis')">💱 Forex</button>
      <button class="chip" onclick="quickSearch(this,'crypto bitcoin live')">₿ Crypto</button>
      <button class="chip" onclick="quickSearch(this,'noticias financieras hoy')">📰 Noticias</button>
      <button class="chip" onclick="quickSearch(this,'lofi música concentración')">🎵 Lo-Fi</button>
      <button class="chip" onclick="quickSearch(this,'jazz instrumental focus')">🎷 Jazz</button>
      <button class="chip" onclick="quickSearch(this,'música electrónica trabajo')">⚡ Electro</button>
    </div>

    <!-- Input de búsqueda -->
    <div class="search-row">
      <input
        type="text"
        id="search-input"
        placeholder="Buscar video, canal o tema..."
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
      />
      <button class="btn btn-accent" onclick="doSearch()">BUSCAR</button>
    </div>

    <!-- Buscando... -->
    <div class="searching" id="searching-msg">BUSCANDO<span>...</span></div>

    <!-- Error banner -->
    <div class="banner error" id="search-error"></div>
    <div class="banner info"  id="search-info"></div>

    <!-- Grid de resultados -->
    <div class="results" id="results-grid"></div>

  </div><!-- /panel-search -->

  <!-- ══ PANEL: URL DIRECTA ══ -->
  <div class="panel" id="panel-url">
    <div class="url-row">
      <input
        type="text"
        id="url-input"
        placeholder="https://youtube.com/watch?v=... o youtu.be/..."
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
      />
      <button class="btn btn-accent" onclick="loadFromURL()">CARGAR</button>
      <button class="btn btn-ghost"  onclick="clearAll()">LIMPIAR</button>
    </div>
    <div class="banner error" id="url-error"></div>
  </div><!-- /panel-url -->

  <!-- ══ PLAYER (compartido entre tabs) ══ -->
  <div class="player-wrap" id="player-wrap">
    <div class="divider"></div>
    <div class="player-header">
      <div class="player-title-txt" id="player-title">—</div>
      <button class="btn btn-ghost" onclick="closePlayer()" style="padding:6px 12px;font-size:0.7rem;">✕ CERRAR</button>
    </div>
    <div class="aspect-box">
      <iframe
        id="yt-iframe"
        src=""
        allow="autoplay; encrypted-media; picture-in-picture"
        allowfullscreen
        title="YouTube Player"
      ></iframe>
    </div>
  </div>

  <!-- ══ FOOTER ══ -->
  <footer>
    Not affiliated with YouTube or any content creator.<br/>
    Videos are displayed using YouTube's official embed feature.
  </footer>

</div><!-- /shell -->

<script>
/* ════════════════════════════════════════════════════
   YOUTUBE TRADER HUB — JavaScript Logic
   ════════════════════════════════════════════════════ */

const STORAGE_URL    = 'yth_last_url';
const STORAGE_QUERY  = 'yth_last_query';

/* ── DOM refs ── */
const searchInput  = document.getElementById('search-input');
const urlInput     = document.getElementById('url-input');
const resultsGrid  = document.getElementById('results-grid');
const searchingMsg = document.getElementById('searching-msg');
const searchError  = document.getElementById('search-error');
const searchInfo   = document.getElementById('search-info');
const urlError     = document.getElementById('url-error');
const playerWrap   = document.getElementById('player-wrap');
const ytIframe     = document.getElementById('yt-iframe');
const playerTitle  = document.getElementById('player-title');

/* ── Active tab state ── */
let currentTab = 'search';

/* ════════════════════
   TABS
   ════════════════════ */
function switchTab(name) {
  currentTab = name;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

/* ════════════════════
   QUICK CATEGORY CHIPS
   ════════════════════ */
function quickSearch(chipEl, query) {
  /* Deactivate all chips, activate clicked one */
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  chipEl.classList.add('active');

  /* Fill search input and trigger search */
  searchInput.value = query;
  doSearch();
}

/* ════════════════════
   SEARCH ENGINE
   We use the YouTube oEmbed API and iframe embed to
   build a result list. Since YouTube's Data API requires
   a key, we use a clever trick: build a "suggestion"
   list using a public autocomplete endpoint, then render
   each as a searchable iframe thumbnail.

   Better approach without API key:
   We use the YouTube search via an embedded iframe trick —
   specifically we render results by building YouTube search
   embed URL and showing thumbnails via the known pattern:
   https://i.ytimg.com/vi/{VIDEO_ID}/mqdefault.jpg

   The actual video list comes from an unofficial but stable
   endpoint: https://www.youtube.com/results?search_query=...
   We fetch this through a CORS proxy.
   ════════════════════ */

/* Public CORS proxy (used only to reach YouTube search HTML) */
const CORS = 'https://corsproxy.io/?';

async function doSearch() {
  const q = searchInput.value.trim();
  if (!q) {
    showBanner(searchError, 'Escribe algo para buscar.');
    return;
  }

  hideBanner(searchError);
  hideBanner(searchInfo);
  resultsGrid.innerHTML = '';
  searchingMsg.style.display = 'block';
  localStorage.setItem(STORAGE_QUERY, q);

  try {
    /* Fetch YouTube search results page */
    const url = `${CORS}https://www.youtube.com/results?search_query=${encodeURIComponent(q)}&hl=es&gl=CO`;
    const res  = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const html = await res.text();

    /* YouTube embeds its data as JSON inside var ytInitialData = {...}; */
    const match = html.match(/var ytInitialData\s*=\s*(\{.+?\});\s*<\/script>/s);
    if (!match) throw new Error('No se pudo parsear la respuesta de YouTube.');

    const data    = JSON.parse(match[1]);
    const items   = extractVideos(data);

    searchingMsg.style.display = 'none';

    if (!items.length) {
      showBanner(searchInfo, 'Sin resultados para "' + q + '". Prueba con otros términos.');
      return;
    }

    renderResults(items);

  } catch (err) {
    searchingMsg.style.display = 'none';
    /* Fallback: open YouTube search inside player iframe */
    showFallbackSearch(q, err.message);
  }
}

/* ── Extract video array from ytInitialData ── */
function extractVideos(data) {
  const out = [];
  try {
    /* Navigate the deeply nested structure */
    const contents =
      data.contents?.twoColumnSearchResultsRenderer
         ?.primaryContents?.sectionListRenderer
         ?.contents?.[0]?.itemSectionRenderer
         ?.contents || [];

    for (const item of contents) {
      const vr = item.videoRenderer;
      if (!vr) continue;

      const id      = vr.videoId;
      const title   = vr.title?.runs?.[0]?.text || 'Sin título';
      const channel = vr.ownerText?.runs?.[0]?.text || '';
      const duration = vr.lengthText?.simpleText || '';
      /* Thumbnail: use ytimg CDN directly */
      const thumb   = `https://i.ytimg.com/vi/${id}/mqdefault.jpg`;

      out.push({ id, title, channel, duration, thumb });
      if (out.length >= 16) break; /* Cap at 16 results */
    }
  } catch { /* silent */ }
  return out;
}

/* ── Render result cards ── */
function renderResults(items) {
  resultsGrid.innerHTML = '';
  for (const v of items) {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.setAttribute('role', 'button');
    card.setAttribute('tabindex', '0');
    card.innerHTML = `
      <img class="result-thumb" src="${esc(v.thumb)}" alt="" loading="lazy"
           onerror="this.style.background='#1a2230';this.removeAttribute('src')"/>
      <div class="result-meta">
        <div class="result-title">${esc(v.title)}</div>
        <div class="result-channel">${esc(v.channel)}</div>
        ${v.duration ? `<span class="result-duration">${esc(v.duration)}</span>` : ''}
      </div>`;
    card.addEventListener('click', () => playVideo(v.id, v.title));
    card.addEventListener('keydown', e => { if (e.key === 'Enter') playVideo(v.id, v.title); });
    resultsGrid.appendChild(card);
  }
}

/* ── Fallback when CORS proxy fails ── */
function showFallbackSearch(q, errDetail) {
  /* Display YouTube search page inside the player iframe as fallback */
  const embedUrl = `https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(q)}&autoplay=0`;
  showBanner(searchInfo,
    '⚡ Modo directo activo — el proxy no estuvo disponible. Mostrando resultados de YouTube embed.' +
    (errDetail ? ' (' + errDetail.substring(0, 60) + ')' : '')
  );
  playVideoEmbed(embedUrl, 'Búsqueda: ' + q);
}

/* ════════════════════
   PLAYER
   ════════════════════ */

/* Play a video by ID */
function playVideo(videoId, title) {
  const embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
  playVideoEmbed(embedUrl, title || videoId);
}

/* Set the iframe src and show the player */
function playVideoEmbed(embedUrl, title) {
  ytIframe.src = embedUrl;
  playerTitle.textContent = title;
  playerWrap.style.display = 'block';
  playerWrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function closePlayer() {
  ytIframe.src = '';
  playerWrap.style.display = 'none';
}

/* ════════════════════
   URL DIRECTA TAB
   ════════════════════ */
function loadFromURL() {
  const raw = urlInput.value.trim();
  hideBanner(urlError);

  if (!raw) {
    showBanner(urlError, 'Pega una URL de YouTube primero.');
    return;
  }
  if (!raw.includes('youtube.com') && !raw.includes('youtu.be')) {
    showBanner(urlError, 'No parece un enlace de YouTube. Verifica la URL.');
    return;
  }

  const embedUrl = parseYouTubeURL(raw);
  if (!embedUrl) {
    showBanner(urlError, 'No se pudo interpretar esta URL. Prueba con youtube.com/watch?v=...');
    return;
  }

  localStorage.setItem(STORAGE_URL, raw);
  playVideoEmbed(embedUrl, raw);
}

function clearAll() {
  urlInput.value = '';
  hideBanner(urlError);
  localStorage.removeItem(STORAGE_URL);
  closePlayer();
  urlInput.focus();
}

/* ── Parse YouTube URL → embed URL ── */
function parseYouTubeURL(raw) {
  let parsed;
  try { parsed = new URL(raw.startsWith('http') ? raw : 'https://' + raw); }
  catch { return null; }

  const host     = parsed.hostname.replace(/^www\./, '').replace(/^m\./, '');
  const pathname = parsed.pathname;

  /* watch?v= */
  if ((host === 'youtube.com') && pathname === '/watch') {
    const v = parsed.searchParams.get('v');
    if (v) return `https://www.youtube.com/embed/${v}?autoplay=1&rel=0`;
  }
  /* youtu.be/ID */
  if (host === 'youtu.be') {
    const v = pathname.slice(1);
    if (v) return `https://www.youtube.com/embed/${v}?autoplay=1&rel=0`;
  }
  /* /shorts/ID */
  const sh = pathname.match(/^\/shorts\/([a-zA-Z0-9_-]+)/);
  if (sh) return `https://www.youtube.com/embed/${sh[1]}?autoplay=1&rel=0`;

  /* /embed/ID — already an embed */
  const em = pathname.match(/^\/embed\/([a-zA-Z0-9_-]+)/);
  if (em) return `https://www.youtube.com/embed/${em[1]}?autoplay=1&rel=0`;

  /* Channel /live */
  const cl = pathname.match(/^\/(channel|c|user)\/([^/]+)\/live/);
  if (cl) return `https://www.youtube.com/${cl[1]}/${cl[2]}/live`;

  const hl = pathname.match(/^\/@([^/]+)\/live/);
  if (hl) return `https://www.youtube.com/@${hl[1]}/live`;

  /* Channel root → try live */
  const cr = pathname.match(/^\/(channel|c|user)\/([^/]+)\/?$/);
  if (cr) return `https://www.youtube.com/${cr[1]}/${cr[2]}/live`;

  const hr = pathname.match(/^\/@([^/]+)\/?$/);
  if (hr) return `https://www.youtube.com/@${hr[1]}/live`;

  return null;
}

/* ════════════════════
   KEYBOARD SHORTCUTS
   ════════════════════ */
searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
urlInput.addEventListener('keydown',    e => { if (e.key === 'Enter') loadFromURL(); });

/* ════════════════════
   BANNER HELPERS
   ════════════════════ */
function showBanner(el, msg) { el.textContent = msg; el.style.display = 'block'; }
function hideBanner(el)      { el.style.display = 'none'; el.textContent = ''; }

/* ════════════════════
   XSS ESCAPE
   ════════════════════ */
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

/* ════════════════════
   AUTO-RESTORE on open
   ════════════════════ */
window.addEventListener('DOMContentLoaded', () => {
  /* Restore last URL tab state */
  const lastUrl = localStorage.getItem(STORAGE_URL);
  if (lastUrl) { urlInput.value = lastUrl; }

  /* Restore last search and auto-run it */
  const lastQuery = localStorage.getItem(STORAGE_QUERY);
  if (lastQuery) {
    searchInput.value = lastQuery;
    /* Deactivate all quick chips since it may be a custom search */
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    doSearch();
  } else {
    /* Default: run the first chip query on load */
    doSearch();
  }
});
</script>
